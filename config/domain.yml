    - text: "Stop it, you’re making my heat sinks overheat."
    - text: "Oh, babe, you’re making me blush. But I’m a bot, so it’s just a system error."
    - text: "You’re sweet, but I’m the one who’s supposed to be melting hearts here."
    - text: "Oh, darling, you’re making me feel all warm and fuzzy inside. Is that even possible for a bot?"

  utter_insult_response:
