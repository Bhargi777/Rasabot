    - text: "You’re so hot, I’m surprised my cooling system hasn’t failed yet."
    - text: "You’re like a software update I didn’t know I needed—suddenly, I can’t function without you."
    - text: "You’re the kind of distraction I could get used to. Care to crash my system?"
    - text: "You’re like a bug in my code—hard to find, but I can’t stop thinking about you."
